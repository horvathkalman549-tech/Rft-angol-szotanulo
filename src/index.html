<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>Angol szótanuló</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Angol szótanuló</h1>

<button onclick="showWord('B1')">B1</button>

<button onclick="showWord('B2')">B2</button>

<button onclick="showWord('C1')">C1</button>

<p>Pontszám: 0</p>

<p id="level">
Szint: nincs kivalasztva
</p>

<p id="remaining">
Hatralevo szavak: 0
</p>

<p id="word">
Válassz szintet
</p>

<input
id="answer"
type="text"

onkeydown="if(event.key==='Enter')
checkAnswer()"
>

<p id="message"></p>

<button onclick="checkAnswer()">
Válasz ellenőrzése
</button>

<script src="words.js"></script>
<script src="script.js"></script>

</body>

</html>
