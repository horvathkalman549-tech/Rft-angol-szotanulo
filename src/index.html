<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>Angol szótanuló</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Angol szótanuló</h1>

<button onclick="showWord('B1')">
Kezdő
</button>

<button onclick="showWord('B2')">
Középhaladó
</button>

<button onclick="showWord('C1')">
Haladó
</button>

<p>Pontszám: 0</p>

<p id="level">
Szint: nincs kiválasztva
</p>

<p id="remaining">
Hátralévő szavak: 0
</p>

<p id="word">
Válassz szintet
</p>

<input
id="answer"
type="text"

onkeydown="if(event.key==='Enter'){event.preventDefault();checkAnswer()}"

>


<p id="message"></p>

<button onclick="checkAnswer()">
Válasz ellenőrzése
</button>

<button

id="restart"

onclick="restartGame()"

style="display:none"

>

Új játék

</button>

<script src="words.js"></script>
<script src="script.js"></script>

</body>

</html>
